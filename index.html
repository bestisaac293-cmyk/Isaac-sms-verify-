<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global OTP Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans">

    <nav class="p-6 border-b border-white/10 flex justify-between">
        <h1 class="text-xl font-black text-blue-500">OTP-FAST</h1>
        <button onclick="showSection('admin')" class="text-xs opacity-30">Partner Login</button>
    </nav>

    <main class="max-w-4xl mx-auto p-6 space-y-10">
        
        <section id="store">
            <h2 class="text-2xl font-bold mb-4">Available Countries</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-slate-800 p-6 rounded-3xl border border-white/5 hover:border-blue-500 transition cursor-pointer" onclick="buyNumber('USA')">
                    <div class="text-4xl mb-2">🇺🇸</div>
                    <h3 class="font-bold">United States</h3>
                    <p class="text-xs text-gray-400">Standard OTP Support</p>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="text-blue-400 font-bold">$2.00</span>
                        <span class="bg-blue-600 px-3 py-1 rounded-full text-[10px] font-bold">BUY</span>
                    </div>
                </div>
                </div>
        </section>

        <section id="inbox" class="space-y-4">
            <h2 class="text-2xl font-bold">Your Active Numbers</h2>
            <div id="userNumbers" class="space-y-3">
                <div class="bg-slate-800 p-4 rounded-2xl border border-blue-500/30">
                    <div class="flex justify-between items-center mb-4">
                        <span class="font-mono text-lg text-blue-300">+1 (555) 012-3456</span>
                        <span class="text-[10px] bg-green-500/20 text-green-400 px-2 py-1 rounded">ACTIVE</span>
                    </div>
                    <div id="smsList" class="space-y-2 max-h-40 overflow-y-auto">
                        <p class="text-[10px] text-gray-500 italic text-center py-4">Waiting for incoming SMS...</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // Use your existing Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyB46iZvlt84c_Uw1km7WU5JUcdf72jhZUE",
            databaseURL: "https://successhomerecovery-default-rtdb.firebaseio.com",
            projectId: "successhomerecovery"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. BUYING LOGIC
        function buyNumber(country) {
            const userId = prompt("Enter your User ID to assign number:");
            if(!userId) return;

            // In a real app, you'd trigger a Twilio API call here
            // For now, we simulate assigning a number in Firebase
            const newNum = {
                number: "+1" + Math.floor(Math.random() * 9000000000),
                country: country,
                owner: userId,
                status: 'active'
            };

            db.ref('rentedNumbers/' + userId).set(newNum).then(() => {
                alert("Number assigned successfully!");
                loadUserInbox(userId);
            });
        }

        // 2. FETCHING SMS FROM TWILIO (Simulated via Firebase)
        function loadUserInbox(userId) {
            db.ref('incomingSMS').orderByChild('forUser').equalTo(userId).on('value', (snap) => {
                const data = snap.val();
                let html = "";
                if(data) {
                    Object.values(data).forEach(msg => {
                        html += `
                            <div class="bg-black/40 p-3 rounded-xl border border-white/5">
                                <p class="text-blue-400 font-bold text-xs mb-1">${msg.sender}</p>
                                <p class="text-sm font-mono">${msg.body}</p>
                                <p class="text-[9px] text-gray-600 mt-1">${msg.time}</p>
                            </div>`;
                    });
                    document.getElementById('smsList').innerHTML = html;
                }
            });
        }
    </script>
</body>
</html>
